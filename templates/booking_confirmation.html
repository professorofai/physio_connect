<!DOCTYPE html>
<html>
<head>
<title>Booking Confirmation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow text-center">

<h2 class="text-success">Appointment Booked Successfully! 🎉</h2>

<hr>

<div class="alert alert-info">
<h5>Appointment Details:</h5>
<p><strong>Date:</strong> {{ date }}</p>
<p><strong>Physiotherapist:</strong> {{ physio_name }}</p>
<p><strong>Status:</strong> <span class="badge bg-warning">{{ status }}</span></p>
</div>

<br>

<a href="/physios" class="btn btn-primary">Book Another Appointment</a>
<a href="/dashboard" class="btn btn-secondary">Go to Dashboard</a>

</div>

</div>

</body>
</html>
