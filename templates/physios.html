<!DOCTYPE html>
<html>
<head>
<title>Physiotherapists</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Available Physiotherapists</h2>

<div class="row">

{% for physio in physios %}

<div class="col-md-4">

<div class="card shadow p-3 mb-4">

<h5>{{ physio.clinic_name }}</h5>

<p>
<b>Location:</b> {{ physio.location }}
</p>

<p>
<b>Specialization:</b> {{ physio.specialization }}
</p>

<a href="/book/{{ physio.id }}" class="btn btn-success">
Book Appointment
</a>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
