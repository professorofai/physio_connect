{% extends "base.html" %}

{% block title %}Login - Physio Connect{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">
                        <i class="fas fa-sign-in-alt me-2"></i>Login to Your Account
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" novalidate>
                        <input type="hidden" name="step" value="1">
                        <div class="mb-3">
                            <label for="phone_number" class="form-label">
                                <i class="fas fa-mobile-alt me-1"></i>Phone Number
                            </label>
                            <input type="tel" class="form-control" id="phone_number" name="phone_number" required
                                   placeholder="+1234567890" data-bs-toggle="tooltip" title="Enter your registered phone number">
                            <div class="invalid-feedback">
                                Please provide your phone number.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-1"></i>Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="Enter your password" data-bs-toggle="tooltip" title="Enter your account password">
                            <div class="invalid-feedback">
                                Please provide your password.
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-mobile-alt me-2"></i>Send Verification Code
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <p class="mb-0">Don't have an account?
                        <a href="/register" class="text-primary fw-bold" data-bs-toggle="tooltip" title="Create a new account">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
